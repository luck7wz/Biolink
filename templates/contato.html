<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Biolink</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="topo">
      <img src="{{ url_for('static', filename='imagens/logo.png') }}" alt="Logo Biolink" class="logo">
      <nav>
        <a href="{{ url_for('index') }}">Início</a>
        <a href="{{ url_for('sobre') }}">Sobre</a>
        <a href="{{ url_for('agendar') }}">Agendar</a>
      </nav>
    </div>
  </header>

  <section class="secao">
    <div class="container">
      <h2>Fale Conosco</h2>
      <p>Tem dúvidas ou sugestões? Entre em contato conosco.</p>
      <form>
        <label>Nome:</label>
        <input type="text" placeholder="Digite seu nome" required>

        <label>Email:</label>
        <input type="email" placeholder="Digite seu email" required>

        <label>Mensagem:</label>
        <textarea rows="4" placeholder="Escreva sua mensagem..." style="padding:10px; border-radius:8px; resize:none;"></textarea>

        <button type="submit">Enviar</button>
      </form>
    </div>
  </section>

  <footer>
    <p>Biolink © 2025</p>
  </footer>
</body>
</html>
