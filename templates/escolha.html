<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha uma opção</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f7f7f7;
            margin-top: 100px;
        }

        h1 {
            color: #b30000;
        }

        button {
            background-color: #b30000;
            color: white;
            border: none;
            padding: 15px 40px;
            margin: 20px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #800000;
        }
    </style>
</head>
<body>
    <h1>O que você deseja fazer?</h1>

    <form action="{{ url_for('hospitais_perto') }}" method="get">
        <button type="submit">QUERO DOAR</button>
    </form>

    <form action="{{ url_for('hospitais_gerais') }}" method="get">
        <button type="submit">PRECISO DE DOAÇÃO</button>
    </form>
</body>
</html>
